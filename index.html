<!DOCTYPE html>
<html>
<head>
  <title>Job Application</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
      padding: 50px;
    }

    form {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #667eea;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #5a67d8;
    }
  </style>
</head>

<body>
  <h1>🚀 Apply for a Job</h1>

  <form action="/apply" method="POST" enctype="multipart/form-data">
    <input type="text" name="name" placeholder="Full Name" required />
    <input type="email" name="email" placeholder="Email" required />
    <input type="file" name="cv" required />
    <button type="submit">Submit Application</button>
  </form>
</body>
</html>
