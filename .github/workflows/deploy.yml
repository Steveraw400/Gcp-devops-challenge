name: Deploy to GCP

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: rawson-devops-project
  REGION: us-central1
  REPO: devops-repo
  SERVICE: devops-app
  BUCKET_NAME: devops-challenge-bucket
  
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: |
          cd terraform
          terraform init


      - name: Terraform Import Repository
        run: |
          cd terraform
          terraform import module.artifact_registry.google_artifact_registry_repository.repo \
          projects/$PROJECT_ID/locations/$REGION/repositories/$REPO

      - name: Terraform Import Service Account
        run: |
          cd terraform
          terraform import module.iam.google_service_account.sa \
          projects/$PROJECT_ID/serviceAccounts/devops-sa@$PROJECT_ID.iam.gserviceaccount.com

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -auto-approve \
           -var="project_id=$PROJECT_ID" \
           -var="bucket_name=$BUCKET_NAME" \
           -var="repo_name=$REPO" \
           -var="region=$REGION" \
           -var="service_name=$SERVICE"

      - name: Configure Docker
        run: gcloud auth configure-docker $REGION-docker.pkg.dev
        
      - name: Build Image
        run: |
         docker build -f Dockerfile -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/app:latest .

      - name: Push Image
        run: |
          docker push  $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/app:latest 
        
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy app \
            --image $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/app:latest \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars BUCKET_NAME=$BUCKET_NAME

     